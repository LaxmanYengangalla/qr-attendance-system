<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .container {
            width: 450px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

		h2 {
		    color: #333;
		    margin-bottom: 20px;
		}

		.dark-mode h2 {
		    color: white;
		}

        #result {
            color: #222;
            line-height: 1.8;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
		
		#profileImage {

		    width: 120px;
		    height: 120px;

		    border-radius: 50%;

		    margin-bottom: 15px;

		    border: 4px solid #007bff;

		    object-fit: cover;
		}
		.menu {

		    margin-top: 25px;
		}

		.menu button {

		    margin: 8px;

		    min-width: 180px;
		}
		
		footer {

		    margin-top: 30px;

		    padding: 15px;

		    text-align: center;

		    color: white;

		    font-size: 14px;
		}
		
		.dark-mode {

		    background: #1e1e1e !important;

		    color: white !important;
		}

		.dark-mode .container {

		    background: #2c2c2c;

		    color: white;
		}

		.dark-mode #result {

		    color: white;
		}
		
		.dark-mode #courseAttendance {

		    color: white;
		}

		.dark-mode #courseAttendance div {

		    background: #3a3a3a !important;

		    color: white !important;
		}

		.dark-mode #courseAttendance h3 {

		    color: white;
		}

		.dark-mode #courseAttendance p {

		    color: white;
		}
		
		
    </style>
	
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">
	
	<h2>Student Profile</h2>
	<img 
	    src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
	    id="profileImage"
	>
	
	<h3 id="welcomeText"></h3>
	
	<h4 id="dateTime"></h4>

    <h3 id="result"></h3>
	
	<div id="courseAttendance"></div>
	
	<canvas id="attendanceChart"></canvas>
	
	<button onclick="toggleDarkMode()">

	    Dark Mode

	</button>
	
	<div class="menu">

	    <button onclick="viewHistory()">
	        Attendance History
	    </button>

	    <button onclick="logout()">
	        Logout
	    </button>

	</div>
	
	<br>

	

</div>

<script>
const API_BASE = window.location.origin;

function getStudent() {

    // ✅ Check login session
    const id = localStorage.getItem("studentId");
	
	const studentName =
	    localStorage.getItem("studentName");

	document.getElementById("welcomeText").innerHTML =

	    "Welcome, " + studentName;
		
	// ✅ Get student name
	
    if (id == null) {

        window.location.href = "student.html";

        return;
    }

    // ✅ Fetch student details
    fetch(`${API_BASE}/admin/students/${id}`)

        .then(response => response.json())

        .then(data => {

            document.getElementById("result").innerHTML =

                "<b>Student Details</b><br><br>" +

                "Name: " + data.name + "<br>" +
                "Email: " + data.email + "<br>" +
                "Course ID: " + data.courseId + "<br><br>";

            // ✅ Load attendance summary
            getAttendance(id);
			
			loadCourseAttendance(id);
        })

        .catch(error => {

            alert("Error loading student");

        });
}

function getAttendance(id) {

    fetch(`${API_BASE}/attendance/student/${id}/summary`)

        .then(response => response.json())

		.then(data => {

		    let color = "green";

		    let warning = "";

		    if (data.percentage < 75) {

		        color = "red";

		        warning =
		            "<br><br><span style='color:red; font-weight:bold;'>"
		            + "Warning: Low Attendance"
		            + "</span>";
		    }

		    document.getElementById("result").innerHTML +=

		        "<b>Attendance Summary</b><br><br>" +

		        "Total Classes: " + data.totalClasses + "<br>" +
		        "Present: " + data.present + "<br>" +

		        "<span style='color:" + color + "; font-weight:bold;'>"
		        + "Percentage: " + data.percentage + "%"
		        + "</span>" +

		        warning;
		})
        .catch(error => {

            alert("Error loading attendance");

        });
}

function markAttendance() {

    // GET QR SESSION ID FROM URL
    const params = new URLSearchParams(window.location.search);

    const qrSessionId = params.get("qrSessionId");

    // GET LOGGED-IN STUDENT ID
    const studentId = localStorage.getItem("studentId");

    // IF QR SESSION NOT FOUND
    if (!qrSessionId) {

        return;
    }

    // IF STUDENT NOT LOGGED IN
    if (!studentId) {

        alert("Please login first");

        window.location.href = "student.html";

        return;
    }

    // CALL ATTENDANCE API
	fetch(`${API_BASE}/attendance/mark?studentId=${studentId}&qrSessionId=${qrSessionId}&role=STUDENT`)

        .then(response => response.text())

        .then(data => {

            alert(data);

        })

        .catch(error => {

            alert("Error marking attendance");

        });
}

window.onload = function() {

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {

        document.body.classList.add("dark-mode");
    }

    // LOAD STUDENT DETAILS
    getStudent();

    // LOAD DATE & TIME
    loadDateTime();

    // ✅ READ QR SESSION ID FROM URL
    const params = new URLSearchParams(window.location.search);

    const qrSessionId = params.get("qrSessionId");

    // ✅ GET STUDENT ID
    const studentId = localStorage.getItem("studentId");

    // ✅ AUTO MARK ATTENDANCE
    if (qrSessionId && studentId) {

        fetch(
            `${API_BASE}/attendance/mark?studentId=${studentId}&qrSessionId=${qrSessionId}&role=STUDENT`
        )

        .then(response => response.text())

		.then(data => {

		    // REMOVE OLD MESSAGE IF EXISTS
		    const oldMessage =
		        document.getElementById("attendanceMessage");

		    if (oldMessage) {

		        oldMessage.remove();
		    }

		    // CREATE MESSAGE BOX
		    const messageDiv =
		        document.createElement("div");

		    messageDiv.id = "attendanceMessage";

		    messageDiv.style.marginTop = "20px";

		    messageDiv.style.padding = "15px";

		    messageDiv.style.borderRadius = "10px";

		    messageDiv.style.fontWeight = "bold";

		    messageDiv.style.fontSize = "18px";

		    // SUCCESS MESSAGE
		    if (data.includes("Successfully")) {

		        messageDiv.style.background = "#d4edda";

		        messageDiv.style.color = "#155724";
		    }

		    // ALREADY MARKED
		    else if (data.includes("Already")) {

		        messageDiv.style.background = "#fff3cd";

		        messageDiv.style.color = "#856404";
		    }

		    // ERROR MESSAGE
		    else {

		        messageDiv.style.background = "#f8d7da";

		        messageDiv.style.color = "#721c24";
		    }

		    messageDiv.innerHTML = data;

		    // ADD MESSAGE BELOW RESULT
		    document.querySelector(".container")
		        .appendChild(messageDiv);
		})

        .catch(error => {

            alert("Error marking attendance");
        });
    }
};


function viewHistory() {

    window.location.href = "attendance-history.html";
}

// ✅ Logout function
function logout() {

    localStorage.clear();

    window.location.href = "student.html";
}

function loadCourseAttendance(id) {

    fetch(`${API_BASE}/attendance/student/${id}/course-summary`)

        .then(response => response.json())

        .then(data => {

            let output = "";

            data.forEach(course => {

                let textColor = "#00ff00";
                let progressColor = "#00ff00";

                if (course.percentage < 75) {

                    textColor = "#ff4444";
                    progressColor = "#ff4444";
                }

                output += `

                <div style="
                    margin-top:15px;
                    padding:15px;
                    border-radius:10px;
                    background:#2f2f2f;
                    text-align:left;
                    box-shadow:0px 0px 10px rgba(0,0,0,0.3);
                ">

                    <h3 style="
                        color:white;
                        margin-bottom:10px;
                    ">
                        ${course.courseName}
                    </h3>

                    <p style="
                        color:white;
                        font-size:18px;
                    ">
                        Attendance:
                        <span style="
                            color:${textColor};
                            font-weight:bold;
                        ">
                            ${course.percentage.toFixed(1)}%
                        </span>
                    </p>

                    <!-- Progress Bar Container -->

                    <div style="
                        width:100%;
                        height:24px;
                        background:#222;
                        border:2px solid white;
                        border-radius:15px;
                        overflow:hidden;
                        margin-top:10px;
                    ">

                        <!-- Progress Fill -->
						<div style="
						    width:calc(${course.percentage}% - 4px);
						    height:20px;
						    margin:2px;

						    background:linear-gradient(
						        90deg,
						        #00ff00,
						        #00ff66,
						        #00ff99
						    );

						    border-radius:12px;

						    box-shadow:
						        0px 0px 10px #00ff00,
						        0px 0px 20px #00ff00,
						        0px 0px 35px #00ff00;

						    transition:0.5s;
						">
						</div>

                    </div>

                    <p style="
                        margin-top:12px;
                        color:white;
                        font-size:17px;
                    ">

                        Present:
                        ${course.presentCount}
                        /
                        ${course.totalClasses}

                    </p>

                </div>
                `;
            });

            document.getElementById("courseAttendance").innerHTML = output;

            loadAttendanceChart(data);
        })

        .catch(error => {

            alert("Error loading course attendance");

        });
}

function loadAttendanceChart(data) {

    const labels = [];

    const percentages = [];

    data.forEach(course => {

        labels.push(course.courseName);

        percentages.push(course.percentage);
    });

    const ctx =
        document.getElementById('attendanceChart');

    new Chart(ctx, {

        type: 'pie',

        data: {

            labels: labels,

            datasets: [{

                label: 'Attendance Percentage',

                data: percentages,

                borderWidth: 1
            }]
        }
    });
}

function loadDateTime() {

    setInterval(() => {

        const now = new Date();

        const date =
            now.toLocaleDateString('en-GB');

        const time =
            now.toLocaleTimeString();

        document.getElementById("dateTime").innerHTML =

            date + " | " + time;

    }, 1000);
}

function toggleDarkMode() {

    document.body.classList.toggle("dark-mode");

    // Save theme
    if (document.body.classList.contains("dark-mode")) {

        localStorage.setItem("theme", "dark");

    } else {

        localStorage.setItem("theme", "light");
    }
}

</script>

<footer>

    QR Attendance System © 2026

</footer>

</body>
</html>
