<!DOCTYPE html>
<html>
<head>
    <title>Lecturer Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --panel: rgba(255,255,255,.94);
            --text: #172033;
            --muted: #64748b;
            --primary: #4f46e5;
            --accent: #06b6d4;
            --line: #d9e2f3;
        }

        body.dark {
            --panel: rgba(15,23,42,.92);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --line: #334155;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(79,70,229,.75), rgba(6,182,212,.55)),
                url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
        }

        .container {
            width: min(520px, 92vw);
            background: var(--panel);
            padding: 34px;
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(15,23,42,.28);
            backdrop-filter: blur(14px);
        }

        .icon {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            display: grid;
            place-items: center;
            font-size: 30px;
            margin-bottom: 18px;
        }

        h2 { margin: 0 0 8px; }
        p { color: var(--muted); margin-top: 0; }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 0 14px;
            margin: 12px 0;
        }

        body.dark .input-group {
            background: #111827;
        }

        .input-group i {
            color: var(--primary);
            width: 18px;
            text-align: center;
        }

        input {
            width: 100%;
            border: none;
            padding: 15px 0;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .secondary {
            background: white;
            color: var(--primary);
            border: 1px solid var(--line);
        }

        body.dark .secondary {
            background: #111827;
        }

        #message {
            margin-top: 15px;
            color: #ef4444;
            font-weight: bold;
            min-height: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon"><i class="fa-solid fa-chalkboard-user"></i></div>
    <h2>Lecturer Registration</h2>
    <p>Sign up to request teaching access from the system administrator.</p>

    <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="name" placeholder="Full Name">
    </div>
    <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address">
    </div>
    <div class="input-group">
        <i class="fa-solid fa-book-open"></i>
        <input type="text" id="subject" placeholder="Subject taught (e.g. Java, Python)">
    </div>
    <div class="input-group">
        <i class="fa-solid fa-key"></i>
        <input type="password" id="password" placeholder="Password">
    </div>
    <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
    </div>

    <button onclick="registerLecturer()"><i class="fa-solid fa-user-plus"></i> Register Request</button>
    <button class="secondary" onclick="goToSignIn()"><i class="fa-solid fa-right-to-bracket"></i> Already registered? Sign In</button>
    <div id="message"></div>
</div>

<script>
    const API_BASE = window.location.origin;

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }

    function registerLecturer() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (!name || !email || !subject || !password || !confirmPassword) {
            showMessage("Please fill all fields.");
            return;
        }

        if (password !== confirmPassword) {
            showMessage("Passwords do not match.");
            return;
        }

        showMessage("Submitting registration...", "#4f46e5");

        fetch(`${API_BASE}/teachers/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name,
                email,
                subject,
                password
            })
        })
        .then(async response => {
            if (!response.ok) {
                const text = await response.text();
                throw new Error(getErrorMessage(text));
            }
            return response.json();
        })
        .then(() => {
            showMessage("Request submitted. Access pending Admin approval.", "#16a34a");
            window.setTimeout(goToSignIn, 2000);
        })
        .catch(error => showMessage(error.message || "Registration failed. Please try again."));
    }

    function getErrorMessage(text) {
        try {
            const parsed = JSON.parse(text);
            return parsed.message || "Registration failed.";
        } catch {
            return text || "Registration failed.";
        }
    }

    function goToSignIn() {
        window.location.href = "login.html";
    }

    function showMessage(text, color) {
        const message = document.getElementById("message");
        message.style.color = color || "#ef4444";
        message.innerText = text;
    }
</script>
</body>
</html>
