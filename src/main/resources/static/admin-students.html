<!DOCTYPE html>
<html>
<head>
    <title>Admin Students</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #f6f9ff;
            --panel: rgba(255,255,255,0.92);
            --text: #172033;
            --muted: #68738a;
            --primary: #4f46e5;
            --accent: #06b6d4;
            --danger: #ef4444;
        }

        body.dark {
            --bg: #101728;
            --panel: rgba(23,32,51,0.94);
            --text: #f8fafc;
            --muted: #b6c2d6;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(79,70,229,.20), transparent 30%),
                radial-gradient(circle at top right, rgba(6,182,212,.20), transparent 32%),
                radial-gradient(circle at bottom left, rgba(236,72,153,.12), transparent 28%),
                linear-gradient(180deg, #fbfdff, var(--bg));
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: linear-gradient(180deg, #21004f, #1e40af);
            position: fixed;
            left: 0;
            top: 0;
            color: white;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 24px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 15px 22px;
            cursor: pointer;
        }

        .sidebar li:hover {
            background: rgba(255,255,255,.12);
        }

        .sidebar i {
            width: 24px;
        }

        .main-content {
            margin-left: 250px;
            padding: 28px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-box, table {
            background: var(--panel);
            border: 1px solid rgba(148,163,184,.28);
            box-shadow: 0 14px 35px rgba(31,41,55,.14);
            backdrop-filter: blur(10px);
        }

        .form-box {
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        input, select {
            padding: 11px;
            margin: 7px;
            border: 1px solid #cfd7ea;
            border-radius: 6px;
            min-width: 180px;
            background: white;
            color: var(--text);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79,70,229,.14);
        }

        button {
            border: none;
            border-radius: 6px;
            padding: 11px 14px;
            cursor: pointer;
            color: white;
            background: var(--primary);
        }

        .delete-btn {
            background: var(--danger);
        }

        .theme-btn {
            background: #0f172a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
        }

        th, td {
            padding: 13px;
            border-bottom: 1px solid rgba(148,163,184,.35);
            text-align: left;
        }

        .roll {
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>

<body>
<div class="sidebar">
    <h2><i class="fa-solid fa-qrcode"></i> Admin</h2>
    <ul>
        <li onclick="location.href='admin-dashboard.html'"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
        <li onclick="location.href='admin-students.html'"><i class="fa-solid fa-user-graduate"></i> Students</li>
        <li onclick="location.href='admin-teachers.html'"><i class="fa-solid fa-chalkboard-user"></i> Lecturer/Professors</li>
        <li onclick="location.href='admin-courses.html'"><i class="fa-solid fa-book-open"></i> Courses</li>
        <li onclick="location.href='report.html'"><i class="fa-solid fa-file-export"></i> Attendance</li>
        <li onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
    </ul>
</div>

<div class="main-content">
    <div class="topbar">
        <div>
            <h1>Student Management</h1>
            <p>Add students, delete students, and use roll numbers for display.</p>
        </div>
        <button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i> Theme</button>
    </div>

    <div class="form-box">
        <h3><i class="fa-solid fa-user-plus"></i> Add Student</h3>
        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="rollNo" placeholder="Roll No">
        <input type="email" id="email" placeholder="Email">
        <select id="groupName" onchange="filterSubjectsByGroup()">
            <option value="">Select Group</option>
            <option value="MSC Statistics">MSC Statistics</option>
            <option value="MSC Computer Science">MSC Computer Science</option>
        </select>
        <select id="courseId">
            <option value="">Select Group First</option>
        </select>
        <button onclick="addStudent()"><i class="fa-solid fa-plus"></i> Add Student</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Roll No</th>
                <th>Name</th>
                <th>Email</th>
                <th>Group</th>
                <th>Subject</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
    </table>
</div>

<script>
    const API_BASE = window.location.origin;
    let courseMap = {};
    let allCourses = [];

    if (localStorage.getItem("role") !== "ADMIN") {
        alert("Access Denied");
        window.location.href = "login.html";
    }

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }

    function loadStudents() {
        Promise.all([
            fetch(`${API_BASE}/students`).then(response => response.json()),
            fetch(`${API_BASE}/courses`).then(response => response.json())
        ])
            .then(([data, courses]) => {
                courseMap = {};
                courses.forEach(course => {
                    courseMap[course.id] = course.courseName;
                });

                let rows = "";

                data.forEach((student, index) => {
                    rows += `
                        <tr>
                            <td>${index + 1}</td>
                            <td class="roll">${student.rollNo || student.id}</td>
                            <td>${student.name}</td>
                            <td>${student.email}</td>
                            <td>${student.groupName || "Not Assigned"}</td>
                            <td>${courseMap[student.courseId] || "Not Assigned"}</td>
                            <td>
                                <button class="delete-btn" onclick="deleteStudent(${student.id})">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById("studentTableBody").innerHTML =
                    rows || "<tr><td colspan='7'>No students found</td></tr>";
            })
            .catch(error => alert("Error loading students"));
    }

    function loadCourses() {
        fetch(`${API_BASE}/courses`)
            .then(response => response.json())
            .then(courses => {
                allCourses = courses;
                filterSubjectsByGroup();
            })
            .catch(error => alert("Error loading subjects"));
    }

    function filterSubjectsByGroup() {
        const groupName = document.getElementById("groupName").value;
        const select = document.getElementById("courseId");
        select.innerHTML = "";

        if (!groupName) {
            select.innerHTML = "<option value=''>Select Group First</option>";
            select.disabled = true;
            return;
        }

        const filteredCourses = allCourses.filter(course =>
            String(course.groupName || "").toLowerCase() === groupName.toLowerCase()
        );

        select.disabled = false;
        select.innerHTML = "<option value=''>Select Subject</option>";

        filteredCourses.forEach(course => {
            const option = document.createElement("option");
            option.value = course.id;
            option.textContent = course.courseName;
            select.appendChild(option);
        });

        if (filteredCourses.length === 0) {
            select.innerHTML = "<option value=''>No subjects available for this group</option>";
        }
    }

    function addStudent() {
        const student = {
            name: document.getElementById("name").value,
            rollNo: document.getElementById("rollNo").value,
            email: document.getElementById("email").value,
            groupName: document.getElementById("groupName").value,
            password: document.getElementById("rollNo").value,
            courseId: document.getElementById("courseId").value
                ? Number(document.getElementById("courseId").value)
                : null
        };

        if (!student.name || !student.rollNo || !student.email || !student.groupName) {
            alert("Please enter name, roll no, email, and group");
            return;
        }

        if (!student.courseId) {
            alert("Please select a subject for the selected group");
            return;
        }

        fetch(`${API_BASE}/students`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        })
        .then(response => response.json())
        .then(data => {
            alert("Student added successfully");
            document.getElementById("name").value = "";
            document.getElementById("rollNo").value = "";
            document.getElementById("email").value = "";
            document.getElementById("groupName").value = "";
            document.getElementById("courseId").value = "";
            filterSubjectsByGroup();
            loadStudents();
        })
        .catch(error => alert("Error adding student"));
    }

    function deleteStudent(id) {
        if (!confirm("Delete this student?")) {
            return;
        }

        fetch(`${API_BASE}/students/${id}`, { method: "DELETE" })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadStudents();
            })
            .catch(error => alert("Error deleting student"));
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    loadCourses();
    loadStudents();
</script>
</body>
</html>
