<!DOCTYPE html>
<html>
<head>
    <title>QR Attendance Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --panel: rgba(255,255,255,.92);
            --text: #172033;
            --muted: #67748e;
            --primary: #4f46e5;
            --accent: #06b6d4;
        }

        body.dark {
            --panel: rgba(15,23,42,.9);
            --text: #f8fafc;
            --muted: #cbd5e1;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                linear-gradient(120deg, rgba(79,70,229,.72), rgba(6,182,212,.55)),
                url("https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
            display: grid;
            place-items: center;
        }

        .login-shell {
            width: min(980px, 92vw);
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            background: var(--panel);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(15,23,42,.28);
            backdrop-filter: blur(14px);
        }

        .hero {
            padding: 42px;
            color: white;
            background: linear-gradient(155deg, rgba(15,23,42,.9), rgba(79,70,229,.72));
        }

        .hero h1 {
            font-size: 42px;
            margin: 0 0 14px;
        }

        .hero p {
            line-height: 1.6;
            color: #dbeafe;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 34px;
        }

        .stat {
            background: rgba(255,255,255,.14);
            border-radius: 12px;
            padding: 16px;
        }

        .stat i {
            color: #67e8f9;
            font-size: 22px;
        }

        .form {
            padding: 42px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-size: 28px;
            margin-bottom: 18px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: 1px solid #d9e2f3;
            border-radius: 12px;
            padding: 0 14px;
            margin: 14px 0;
        }

        body.dark .input-group {
            background: #111827;
            border-color: #334155;
        }

        .input-group i {
            color: var(--primary);
        }

        input {
            width: 100%;
            border: none;
            padding: 15px 0;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        .student-link, .theme-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--primary);
            cursor: pointer;
            font-weight: bold;
        }

        .message {
            margin-top: 14px;
            color: #ef4444;
            min-height: 22px;
        }

        @media (max-width: 780px) {
            .login-shell {
                grid-template-columns: 1fr;
            }

            .hero {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="login-shell">
    <section class="hero">
        <h1>QR Attendance System</h1>
        <p>Smart attendance with live QR sessions, student tracking, reports, and role-based dashboards.</p>
        <div class="stats">
            <div class="stat"><i class="fa-solid fa-qrcode"></i><h3>QR</h3><p>Fast scan attendance</p></div>
            <div class="stat"><i class="fa-solid fa-chart-pie"></i><h3>Charts</h3><p>Visual summaries</p></div>
            <div class="stat"><i class="fa-solid fa-shield-halved"></i><h3>Roles</h3><p>Admin and lecturer/professor login</p></div>
        </div>
    </section>

    <section class="form">
        <div class="brand-icon"><i class="fa-solid fa-user-lock"></i></div>
        <h2>Welcome Back</h2>
        <p style="color:var(--muted);">Login as Admin or Lecturer/Professor.</p>

        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="text" id="email" placeholder="Enter Email">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-key"></i>
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        <div class="student-link" onclick="location.href='student.html'">
            <i class="fa-solid fa-user-graduate"></i> Student Login
        </div>
        <br>
        <div class="theme-link" onclick="toggleTheme()">
            <i class="fa-solid fa-circle-half-stroke"></i> Toggle Theme
        </div>
        <div id="message" class="message"></div>
    </section>
</div>

<script>
    const API_BASE = window.location.origin;

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }

    function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch(`${API_BASE}/users/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`)
            .then(response => response.text())
            .then(data => {
                if (data.includes("Invalid")) {
                    document.getElementById("message").innerText = "Invalid Email or Password";
                    return;
                }

                if (data.includes("STUDENT")) {
                    window.location.href = "student.html";
                    return;
                }

                if (data.includes("TEACHER")) {
                    localStorage.setItem("role", "TEACHER");
                    localStorage.setItem("email", email);
                    localStorage.setItem("teacherName", email);
                    window.location.href = "teacher.html";
                }

                if (data.includes("ADMIN")) {
                    localStorage.setItem("role", "ADMIN");
                    localStorage.setItem("email", email);
                    window.location.href = "admin-dashboard.html";
                }
            })
            .catch(error => {
                document.getElementById("message").innerText = "Error connecting to server";
            });
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
</script>
</body>
</html>
